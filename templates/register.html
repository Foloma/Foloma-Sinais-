<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foloma Visão 360 – Registo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { color: #fbbf24; text-align: center; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            color: white;
            font-size: 16px;
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .link { text-align: center; margin-top: 20px; font-size: 14px; }
        .link a { color: #fbbf24; text-decoration: none; }
        .flash {
            background: rgba(239,68,68,0.2);
            border-left: 4px solid #ef4444;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
            color: #f1f5f9;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📝 Criar Conta Foloma</h1>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash">
                    {% for message in messages %}{{ message }}<br>{% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        <form method="post">
            <input type="text" name="username" placeholder="Utilizador" required>
            <input type="password" name="password" placeholder="Palavra-passe (mínimo 4 caracteres)" required>
            <button type="submit">Registar</button>
        </form>
        <div class="link">
            Já tem conta? <a href="{{ url_for('login') }}">Faça login</a>
        </div>
    </div>
</body>
</html>
